[build]
  publish = "pepstracker_fixed"
  command = "echo 'Static site - no build required'"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# ── Security headers ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"

  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Block clickjacking
    X-Frame-Options = "SAMEORIGIN"

    # Legacy XSS filter
    X-XSS-Protection = "1; mode=block"

    # Don't leak full URL to third-party sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Force HTTPS for 2 years across all subdomains — submitted to preload list
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Prevent other sites loading our resources cross-origin
    Cross-Origin-Resource-Policy = "cross-origin"

    # Note: COOP removed — was blocking Firebase Google auth popup messaging

    # Content Security Policy — allows Firebase, Google APIs, our own assets
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseapp.com https://*.googleapis.com https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://*.firebase.com https://api.anthropic.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src https://*.firebaseapp.com https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self';"
# cache-bust: vendors-cards-fix

[[redirects]]
  from = "/api/advisor"
  to = "/.netlify/functions/advisor"
  status = 200
