<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — PepsTracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg:#0d0f14; --surface:#161b25; --card:#1c2230;
      --border:#2a3347; --blue:#3b9eff; --green:#4de87a;
      --text:#e8edf5; --muted:#7a8ba8; --gold:#f5c842;
      --red:#ff5c5c; --radius:12px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;}
    .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .logo-icon{width:36px;height:36px;}
    .logo-text{font-size:1.35rem;font-weight:800;letter-spacing:-.5px;}
    .logo-text span:first-child{color:var(--blue);}
    .logo-text span:last-child{color:var(--green);}
    .back-link{color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px;transition:color .2s;}
    .back-link:hover{color:var(--blue);}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
    .auth-wrap{width:100%;max-width:400px;}
    .auth-header{text-align:center;margin-bottom:32px;}
    .auth-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;}
    .auth-header h1 span{color:var(--blue);}
    .auth-header p{color:var(--muted);font-size:.9rem;}
    .auth-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:28px;}
    .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:13px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:20px;}
    .btn-google:hover{border-color:var(--blue);background:rgba(59,158,255,.05);}
    .btn-google svg{width:18px;height:18px;flex-shrink:0;}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .divider span{color:var(--muted);font-size:.78rem;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .field input{width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:9px;padding:12px 14px;font-size:.95rem;font-family:inherit;transition:border-color .2s;}
    .field input:focus{outline:none;border-color:var(--blue);}
    .field input::placeholder{color:var(--muted);}
    .forgot{display:block;text-align:right;font-size:.78rem;color:var(--muted);text-decoration:none;margin-top:5px;transition:color .2s;}
    .forgot:hover{color:var(--blue);}
    .btn-submit{width:100%;background:linear-gradient(135deg,var(--blue),#1e6fcf);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;}
    .btn-submit:hover{opacity:.9;transform:translateY(-1px);}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .error-msg{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:.83rem;margin-bottom:16px;display:none;}
    .error-msg.show{display:block;}
    .success-msg{background:rgba(77,232,122,.08);border:1px solid rgba(77,232,122,.3);color:var(--green);border-radius:8px;padding:10px 14px;font-size:.83rem;margin-bottom:16px;display:none;}
    .success-msg.show{display:block;}
    .auth-footer{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted);}
    .auth-footer a{color:var(--blue);text-decoration:none;font-weight:600;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{border-top:1px solid var(--border);padding:16px;text-align:center;color:var(--muted);font-size:.78rem;}
    footer a{color:var(--blue);text-decoration:none;}
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <svg class="logo-icon" viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id="g1" x1="20" y1="130" x2="180" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a7fe8"/><stop offset="50%" stop-color="#00e5cc"/><stop offset="100%" stop-color="#4de87a"/>
          </linearGradient>
          <linearGradient id="g2" x1="20" y1="150" x2="180" y2="150" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a7fe8"/><stop offset="100%" stop-color="#4de87a"/>
          </linearGradient>
        </defs>
        <path d="M20 140 Q100 195 180 120" fill="none" stroke="url(#g2)" stroke-width="10" stroke-linecap="round"/>
        <line x1="20" y1="128" x2="82" y2="82" stroke="url(#g1)" stroke-width="10" stroke-linecap="round"/>
        <line x1="82" y1="82" x2="128" y2="105" stroke="url(#g1)" stroke-width="10" stroke-linecap="round"/>
        <line x1="128" y1="105" x2="168" y2="48" stroke="#4de87a" stroke-width="10" stroke-linecap="round"/>
        <polygon points="178,38 152,46 168,64" fill="#4de87a"/>
        <circle cx="20" cy="128" r="18" fill="#1a7fe8"/>
        <circle cx="82" cy="82" r="18" fill="#00e5cc"/>
        <circle cx="128" cy="105" r="18" fill="#4de87a"/>
      </svg>
      <div class="logo-text"><span>Peps</span><span>Tracker</span></div>
    </a>
    <a class="back-link" href="signup.html">New here? Create account →</a>
  </div>
</header>

<main>
  <div class="auth-wrap">
    <div class="auth-header">
      <h1>Welcome <span>back</span></h1>
      <p>Sign in to your PepsTracker account.</p>
    </div>

    <div class="auth-card">
      <button class="btn-google" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or sign in with email</span></div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Your password" autocomplete="current-password" />
        <a class="forgot" href="#" onclick="resetPassword(event)">Forgot password?</a>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="signInWithEmail()">Sign In</button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>
  </div>
</main>

<footer>
  <a href="index.html">← Back to PepsTracker</a>
</footer>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyArzH9f9tj-aXftLtGAXowVepaR3u61znc",
    authDomain: "pepstracker.firebaseapp.com",
    projectId: "pepstracker",
    storageBucket: "pepstracker.firebasestorage.app",
    messagingSenderId: "575079448915",
    appId: "1:575079448915:web:4937336ccc15a6764ca1a6",
    measurementId: "G-5GCTD1XQ7X"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }
  function showSuccess(msg) {
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('successMsg').classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
  }
  function setLoading(loading) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Signing in…' : 'Sign In';
  }

  async function signInWithEmail() {
    document.getElementById('errorMsg').classList.remove('show');
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    if (!email || !password) return showError('Please enter your email and password.');
    setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = 'account.html';
    } catch (err) {
      const msgs = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password. Try again.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
      };
      showError(msgs[err.code] || err.message);
      setLoading(false);
    }
  }

  async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
      window.location.href = 'account.html';
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') showError(err.message);
    }
  }

  async function resetPassword(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    if (!email) return showError('Enter your email address above first.');
    try {
      await auth.sendPasswordResetEmail(email);
      showSuccess('Password reset email sent! Check your inbox.');
    } catch (err) {
      showError('Could not send reset email. Check the address and try again.');
    }
  }

  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'account.html';
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') signInWithEmail();
  });
</script>
</body>
</html>
