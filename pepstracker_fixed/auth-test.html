<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Auth Debug v3</title>
  <style>
    body{font-family:monospace;background:#0d0f14;color:#edf2ff;padding:20px;font-size:13px}
    h2{color:#3b9eff;margin-bottom:12px}
    .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;margin:4px;background:#3b9eff;color:#fff}
    .log{background:#111620;border:1px solid #1f2d42;border-radius:8px;padding:10px 12px;margin:4px 0;line-height:1.7}
    .ok{color:#4de87a}.err{color:#ff5c5c}.warn{color:#f5c842}.info{color:#3b9eff}
    pre{white-space:pre-wrap;word-break:break-all;font-size:11px;margin-top:4px;color:#aaa}
  </style>
</head>
<body>
<h2>🔬 Auth Debug v3 — DOM Level Intercept</h2>
<button class="btn" onclick="runTest()">▶ Run Full Test</button>
<button class="btn" style="background:#333;color:#aaa" onclick="document.getElementById('log').innerHTML=''">Clear</button>
<div id="log" style="margin-top:12px"></div>

<script>
// ── Log helper ───────────────────────────────────────────────
function log(msg, type) {
  const d = document.createElement('div');
  d.className = 'log ' + (type||'info');
  d.innerHTML = new Date().toISOString().split('T')[1].slice(0,8) + ' ' + msg;
  document.getElementById('log').appendChild(d);
  console.log('[AUTH]', msg.replace(/<[^>]+>/g,''));
}

// ── Intercept window.open ────────────────────────────────────
const _open = window.open.bind(window);
window.open = function(url, name, features) {
  log('🪟 window.open() called<br><small>URL: ' + (url||'').substring(0,100) + '</small>');
  const popup = _open.apply(window, arguments);
  if (!popup) {
    log('<span class="err">❌ window.open() returned NULL — popup was BLOCKED by browser</span>', 'err');
  } else {
    log('<span class="ok">✅ window.open() succeeded — popup opened</span>', 'ok');
  }
  return popup;
};

// ── Intercept iframe creation ────────────────────────────────
const _createElement = document.createElement.bind(document);
document.createElement = function(tag) {
  const el = _createElement.apply(document, arguments);
  if (tag && tag.toLowerCase() === 'iframe') {
    el.addEventListener('load', function() {
      log('<span class="ok">✅ IFRAME LOADED: ' + (this.src||'(no src)').substring(0,80) + '</span>', 'ok');
    });
    el.addEventListener('error', function(e) {
      log('<span class="err">❌ IFRAME ERROR (isTrusted:' + e.isTrusted + '): ' + (this.src||'(no src)').substring(0,80) + '</span><br><small>THIS is the source of auth/internal-error</small>', 'err');
    });
    // Log when src is set
    let _src = '';
    Object.defineProperty(el, 'src', {
      get: () => _src,
      set: (v) => {
        _src = v;
        log('🖼️ IFRAME src set: ' + (v||'').substring(0,100));
        el.setAttribute('src', v);
      },
      configurable: true
    });
  }
  return el;
};

// ── Intercept appendChild to catch iframe insertion ──────────
const _append = Element.prototype.appendChild;
Element.prototype.appendChild = function(child) {
  if (child && child.tagName === 'IFRAME') {
    log('📌 IFRAME appended to DOM (src: ' + (child.src||child.getAttribute('src')||'not yet set') + ')');
  }
  return _append.apply(this, arguments);
};

// ── Intercept global errors ──────────────────────────────────
window.addEventListener('error', function(e) {
  log('<span class="err">❌ GLOBAL ERROR (isTrusted:' + e.isTrusted + ')<br>Message: ' + e.message + '<br>Source: ' + e.filename + ':' + e.lineno + '</span>', 'err');
});

window.addEventListener('unhandledrejection', function(e) {
  log('<span class="err">❌ UNHANDLED PROMISE: ' + (e.reason?.message || e.reason) + '</span>', 'err');
});

// ── CSP violation listener ───────────────────────────────────
document.addEventListener('securitypolicyviolation', function(e) {
  log('<span class="err">🚨 CSP VIOLATION!<br>Blocked: ' + e.blockedURI + '<br>Directive: ' + e.violatedDirective + '</span>', 'err');
});

// ── Main test ────────────────────────────────────────────────
function runTest() {
  log('<span class="info">━━━ Starting full auth test ━━━</span>');

  if (!firebase.apps.length) firebase.initializeApp({
    apiKey:"AIzaSyArzH9f9tj-aXftLtGAXowVepaR3u61znc",
    authDomain:"pepstracker.firebaseapp.com",
    projectId:"pepstracker"
  });
  const auth = firebase.auth();
  log('✅ Firebase initialized');

  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:'select_account'});
  log('⏳ Calling signInWithPopup...');

  auth.signInWithPopup(provider)
    .then(r => log('<span class="ok">✅ SUCCESS: ' + r.user.email + '</span>', 'ok'))
    .catch(e => {
      log('<span class="err">❌ FINAL ERROR: ' + e.code + ' — ' + e.message + '</span>', 'err');
      log('<pre>' + JSON.stringify({code:e.code, customData:e.customData}, null, 2) + '</pre>');
    });
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</body>
</html>
