name: PepsTracker Price Scraper
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install requests playwright
          python -m playwright install chromium
          sudo apt-get install -y libglib2.0-0 libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcb1 libxkbcommon0 libatspi2.0-0 libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64
      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.SCRAPER_GITHUB_TOKEN }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          GLACIER_EMAIL: ${{ secrets.GLACIER_EMAIL }}
          GLACIER_PASSWORD: ${{ secrets.GLACIER_PASSWORD }}
          MILEHIGH_EMAIL: ${{ secrets.MILEHIGH_EMAIL }}
          MILEHIGH_PASSWORD: ${{ secrets.MILEHIGH_PASSWORD }}
          ATOMIK_EMAIL: ${{ secrets.ATOMIK_EMAIL }}
          ATOMIK_PASSWORD: ${{ secrets.ATOMIK_PASSWORD }}
        run: python scraper.py
